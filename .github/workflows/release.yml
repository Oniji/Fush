name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack addon
        run: |
          # Archive root is "fush/" so users extract into Ashita/addons/
          zip -r "fush-${{ github.ref_name }}.zip" fush \
            -x "fush/**/.DS_Store" \
            -x "fush/**/Thumbs.db"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: fush-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
